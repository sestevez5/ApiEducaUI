<div class="panelParametros">
    <div class="seccionBuscador">
        <form class="example-form">
            <mat-form-field class="example-full-width" appearance="fill">
              <mat-label>Buscar</mat-label>
              <input matInput #message maxlength="256" placeholder="Ejemplo: SituacionAprendizajeEXDTOs..." >
              <!-- <mat-hint align="start"><strong>La búsqueda atiende nombre de Dtos y campos</strong> </mat-hint> -->
              <!-- <mat-hint align="end">{{message.value.length}} / 256</mat-hint> -->
            </mat-form-field>
        </form>
    </div>
    <div>
        <mat-slide-toggle ngModel name="enableWifi">Mostrar tipo de campos</mat-slide-toggle>

    </div>
    
    <mat-slide-toggle ngModel name="enableWifi">Mostrar descripciones</mat-slide-toggle>

    <section class="example-section">
        <span class="example-list-section">
          <mat-checkbox class="example-margin"
                        [checked]="allComplete"
                        [color]="task.color"
                        [indeterminate]="someComplete()"
                        (change)="setAll($event.checked)">
            {{task.name}}
          </mat-checkbox>
        </span>
        <span class="example-list-section">
          <ul>
            <li *ngFor="let subtask of task.subtasks">
              <mat-checkbox [(ngModel)]="subtask.completed"
                            [color]="subtask.color"
                            (ngModelChange)="updateAllComplete()">
                {{subtask.name}}
              </mat-checkbox>
            </li>
          </ul>
        </span>
      </section>

      <section class="example-section">
        <span class="example-list-section">
          <mat-checkbox class="example-margin"
                        [checked]="allComplete"
                        [color]="task.color"
                        [indeterminate]="someComplete()"
                        (change)="setAll($event.checked)">
            {{task.name}}
          </mat-checkbox>
        </span>
        <span class="example-list-section">
          <ul>
            <li *ngFor="let subtask of task.subtasks">
              <mat-checkbox [(ngModel)]="subtask.completed"
                            [color]="subtask.color"
                            (ngModelChange)="updateAllComplete()">
                {{subtask.name}}
              </mat-checkbox>
              <span class="example-list-section">
                <ul>
                  <li *ngFor="let subtask of task.subtasks">
                    <mat-checkbox [(ngModel)]="subtask.completed"
                                  [color]="subtask.color"
                                  (ngModelChange)="updateAllComplete()">
                      {{subtask.name}}
                    </mat-checkbox>
                  </li>
                </ul>
              </span>
            </li>
          </ul>
        </span>
      </section>
    
</div>
