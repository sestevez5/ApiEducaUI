<h2 mat-dialog-title>Selector de agrupamiento</h2>
    <div mat-dialog-content>
        <div class="arbol">

            <div class="nodo nodoRaiz" [ngClass]="{nodoSeleccionado: this.nodosAgrupamientos.id === this.idNodoSeleccionado}" (click)="onSeleccionarNodo($event, this.nodosAgrupamientos.id)">
                <span >Todos</span>

                <div    class="nodo nodoIntermedio" 
                        *ngFor="let nodoIntermedio of this.nodosAgrupamientos.hijos"  
                        [ngClass]="{nodoSeleccionado: this.nodoIntermedio.id === this.idNodoSeleccionado}" 
                        (click)="onSeleccionarNodo($event,this.nodoIntermedio.id)">
                    
                        <span >{{ nodoIntermedio.texto }}</span>

                    <div    class="nodo nodoHijo" 
                            *ngFor="let nodoHijo of this.nodoIntermedio.hijos" 
                            [ngClass]="{nodoSeleccionado: this.nodoHijo.id === this.idNodoSeleccionado}"
                            (click)="onSeleccionarNodo($event,this.nodoHijo.id)" >
                        
                            <span>{{ nodoHijo.texto }}</span>
                        
                    </div>

                </div>

            </div> 
            
            
        


        </div>
    </div>
    <div mat-dialog-actions>
        <button mat-button >Cancelar</button>
        <button mat-button [mat-dialog-close]="this.idNodoSeleccionado" cdkFocusInitial>Aceptar</button>
      </div>
