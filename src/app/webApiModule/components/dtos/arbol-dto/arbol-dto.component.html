<div *ngIf="dto"  class="dto" [ngClass]="{'DtoHijo' : !esDtoRaiz}">
    <div class="seccion seccionCabeceraDto" [ngClass]="esDtoRaiz ? 'seccionCabeceraDtoRaiz' : 'seccionCabeceraDtoHijo'">
  
        <div class="tipoDto">
            {{dto.nombreDto}}

        </div>
        <div class="botonDesplegarExpandir">
            <button  (click)="expandir = !expandir"  mat-icon-button aria-label="Example icon-button with menu icon">
                <mat-icon class="iconoDesplegarExpandir" [ngClass]="{'rotado' : !expandir}">expand_more</mat-icon>
            </button>

        </div>
        
        
   
    </div>
    <div *ngIf="!this.esCampoSimple(dto)" class="seccion seccionCuerpo" [ngClass]="{'oculto' : !expandir}">

        <div class="seccion seccionCampo" *ngFor="let campo of dto.campos" >

            
            
            <ng-container *ngIf="this.esCampoSimple(campo.tipoCampo); else campoDto" >
                <div class="seccion seccionNombre">{{campo.nombreCampo}}:</div>
                <div class="seccion seccionDatosTipoCampo seccionDatosTipoCampoSimple"  >
                    [{{campo.tipoCampo}}]
                </div>
            </ng-container>

            <ng-template #campoDto>
                <div class="seccion seccionNombre">{{campo.nombreCampo}}:</div>
                <div class="seccion seccionDatosTipoCampo seccionDatosTipoCampoDto"  >
                    <app-arbol-dto *ngIf="!this.esCampoSimple(campo.tipoCampo)" [dto]="(campo.tipoCampo | como : IDto)"  [esDtoRaiz]="false"></app-arbol-dto>
                </div>

            </ng-template>

        </div>
    
    </div>
</div>
