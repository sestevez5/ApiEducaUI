<!-- Sección que contempla el nombre del propiedad. Es común, independiente del tipo de la propiedad -->
<div class="seccion seccionRespuesta">
    <div class="seccion seccionCodigoHttp" >
        <span class="texto codigoHttp" [ngStyle]="{'color': this.responseWithCode.codigoHttpOrDefault==='200'?'green':'red'}">Código Http {{this.responseWithCode.codigoHttpOrDefault}}:</span>
    </div>

    <div *ngIf="!this.responseWithCode.response.content[0]"  class="seccion seccionCodigoHttp" >
        <span class="texto">Sin especificar</span>
    </div>

    <div *ngIf="this.responseWithCode.response.content[0]" class="seccion seccionSchemaRespuesta">
        <app-arbol-schemas [schema]="this.responseWithCode.response.content[0].schema" [mostrarDescripcionesSchemas]="this.mostrarDescripciones" [expandido]="false"></app-arbol-schemas>
    </div>
</div>
