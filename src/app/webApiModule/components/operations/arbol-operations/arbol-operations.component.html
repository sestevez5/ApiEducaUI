
<mat-expansion-panel [expanded]="this.expandido" *ngIf="this.operation" class="endpoint">
    
    <!-- Cabecera -->
    <mat-expansion-panel-header class="seccion seccionCabeceraEndpoint">
        <mat-panel-title>
            <div class="metodoEndpoint" [ngStyle]="{'background-color': colorMetodo(operation.metodo).color}"> 
                {{colorMetodo(operation.metodo).nombreMetodo}}
            </div> 
            <span>{{operation.path}}</span> 
        </mat-panel-title>
      <mat-panel-description *ngIf="this.mostrarDescripcionesOperations" > This is a summary of the content </mat-panel-description>
    </mat-expansion-panel-header>

    <!-- Cuerpo: Colección de campos -->
    <div class="seccion seccionCuerpoEndpoint">


        <!-- Sección correspondiente a los campos de tipo path -->
        <mat-expansion-panel *ngIf="this.parametrosPath()" [expanded]="this.expandido" >
            
            <!-- Cabecera -->
            <mat-expansion-panel-header class="seccion seccionCabeceraEndpoint">
                <mat-panel-title>Parámetros Path</mat-panel-title>
            </mat-expansion-panel-header>

            <!-- Cuerpo: Colección de campos -->
            <div class="seccion seccionCuerpoEndpoint">
                <app-parameters-operation  [parameters]="this.parametrosPath()" ></app-parameters-operation>
            </div> <!-- Fin sección cuerpo -->
        </mat-expansion-panel>


           
        <!-- Sección correspondiente a los campos de tipo query -->
        <mat-expansion-panel *ngIf="this.parametrosQuery()"  [expanded]="this.expandido" >
            
            <!-- Cabecera -->
            <mat-expansion-panel-header class="seccion seccionCabeceraEndpoint">
                <mat-panel-title>Parámetros Query</mat-panel-title>
            </mat-expansion-panel-header>

            <!-- Cuerpo: Colección de campos -->
            <div class="seccion seccionCuerpoEndpoint">
                <app-parameters-operation [parameters]="this.parametrosQuery()"></app-parameters-operation>
            </div> <!-- Fin sección cuerpo -->

        </mat-expansion-panel>


                <!-- Sección correspondiente a las respuestas -->
                <mat-expansion-panel [expanded]="this.expandido" >
            
                    <!-- Cabecera -->
                    <mat-expansion-panel-header class="seccion seccionCabeceraEndpoint">
                        <mat-panel-title>Respuestas</mat-panel-title>
                    </mat-expansion-panel-header>
        
                    <!-- Cuerpo: Colección de campos -->
                    <div class="seccion seccionCuerpoEndpoint">
                     
                        Aquí van los campos
                      
                    </div> <!-- Fin sección cuerpo -->
                </mat-expansion-panel>
        


    </div> <!-- Fin sección cuerpo -->
</mat-expansion-panel>
