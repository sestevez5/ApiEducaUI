<div class="container-fluid">
  
  <div class="selectorEntornos">
    <mat-form-field appearance="legacy">
      <mat-label>Entorno</mat-label>
      <mat-select [(value)]="selectedFood">
        <mat-option></mat-option>
        <mat-option [value]="option.value" *ngFor="let option of documentosOpenApiPrefijados">{{ option.viewValue }}</mat-option>
      </mat-select>
    </mat-form-field>
  </div>


  <mat-tab-group>
    <mat-tab label="DTOS">    
      <div class="webApiPestanya">
        <app-main-dtos></app-main-dtos>   
      </div>
      
   
    </mat-tab>
    
    <mat-tab label="Endpoints"> 
      <div class="webApiPestanya">
        <app-main-dtos></app-main-dtos>   
      </div>
      
    </mat-tab>
  </mat-tab-group>

</div>
